<!DOCTYPE html>
<html>
<script>
  function login() {
    let user = JSON.parse(localStorage.getItem("user"));
    let passw = JSON.parse(localStorage.getItem("passw"));
    let money = JSON.parse(localStorage.getItem("money"));
    let fName = JSON.parse(localStorage.getItem("fName"));
    let lName = JSON.parse(localStorage.getItem("lName"));
    let username = prompt("Username:  ");
    let password = prompt("Password:  ");
    if (username === user && password === passw) {
        alert("Welcome, " + fName + " " + lName);
        let option = prompt("What do you want to do? View account balance, Add money, Take away money.").toLowerCase();
        if (option === "view account balance") {
          alert("Your account balance is: " + money);
        } else if (option === "add money") {
          let amount_add = Number(prompt("How mutch:  "));
          let new_balance = amount_add + money;
          localStorage.setItem("money", JSON.stringify(new_balance));
          alert("Operation executed sucessfully, your new balance is: " + new_balance);
        } else if (option === "take away money") {
          let amount_take = Number(prompt("How mutch:  "));
          let new_balance = money - amount_take;
          localStorage.setItem("money", JSON.stringify(new_balance));
          alert("Operation executed sucessfully, your new balance is " + new_balance);
        } else {
          alert("Invalid input, please try again");
        }
     }
  }
</script>
<script>
  function makeAccount() {
    let user = prompt("What would you like your username to be?  ");
    localStorage.setItem("user", JSON.stringify(user));
    let passw = prompt("What would you like your password to be?  ");
    localStorage.setItem("passw", JSON.stringify(passw));
    let money = prompt("How much money do you have?  ");
    localStorage.setItem("money", JSON.stringify(money));
    let fname = prompt("What is your first name?  ");
    localStorage.setItem("fName", JSON.stringify(fname));
    let lname = prompt("What is your last name?  ");
    localStorage.setItem("lName", JSON.stringify(lname));
   alert("Account creates sucessfully, revisit page to log in")
  }
</script>
<head>
<style>
.myDiv {
  border: 5px outset red;
  background-color: lightblue;    
  text-align: center;
}
</style>
<title>Js Bank</title>
</head>
<body>
<div class="myDiv">
  <h1><b>Options</b></h1>
  <button onclick="login()">Login to localy saved account</button>
  <button onclick="makeAccount()">Create Account</button>
</div>
</body>
</html>
